<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>3D Man of Steel - Flight Simulation</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      touch-action: none; 
      -webkit-touch-callout: none;
      user-select: none;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #020208;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

  <div id="canvas-container"></div>

  <script>
    // --- 1. SETUP SCENE, CAMERA, & MAX-QUALITY RENDERER ---
    const container = document.getElementById('canvas-container');
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x0a142c, 0.015); // Rich deep atmosphere fog

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 2, 8); // Cinematic angle looking down at him flying

    // UNLEASHED PERFORMANCE: Maximum anti-aliasing, high-precision shaders
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio); // Full razor-sharp display resolution
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enableZoom = false;

    // --- 2. LUXURY CINEMATIC LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0x0a1e3f, 1.2); // Cool atmospheric ambient sky light
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffddaa, 2.5); // Bright warm yellow sun
    sunLight.position.set(5, 15, -10);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.width = 2048; // High-res shadow maps
    sunLight.shadow.mapSize.height = 2048;
    scene.add(sunLight);

    const skyGlow = new THREE.DirectionalLight(0x00aaff, 1.0); // Ambient blue reflection from the sky below
    skyGlow.position.set(-5, -10, 5);
    scene.add(skyGlow);

    // --- 3. HIGH-SPEED PARTICLE SPEED DUST & VOLUMETRIC CLOUDS ---
    // Speed Particles
    const particleCount = 150;
    const particleGeo = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const speeds = [];

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 30; // X
      positions[i * 3 + 1] = (Math.random() - 0.5) * 30; // Y
      positions[i * 3 + 2] = -Math.random() * 50; // Z
      speeds.push(Math.random() * 40 + 20); // Speed factor
    }

    particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    const particleMat = new THREE.PointsMaterial({
      color: 0xffffff,
      size: 0.08,
      transparent: true,
      opacity: 0.6
    });
    const speedDust = new THREE.Points(particleGeo, particleMat);
    scene.add(speedDust);

    // 3D Volumetric Clouds
    const clouds = [];
    const cloudGeo = new THREE.DodecahedronGeometry(3, 1);
    const cloudMat = new THREE.MeshPhongMaterial({
      color: 0x1d3557,
      transparent: true,
      opacity: 0.25,
      flatShading: true
    });

    for (let i = 0; i < 5; i++) {
      const cloud = new THREE.Mesh(cloudGeo, cloudMat);
      cloud.position.set(
        (Math.random() - 0.5) * 25,
        (Math.random() - 0.5) * 15,
        -Math.random() * 100 - 50
      );
      scene.add(cloud);
      clouds.push(cloud);
    }

    // --- 4. MODELING THE HIGH-POLYGON SUPERMAN ---
    const hero = new THREE.Group();
    scene.add(hero);

    // High-End Shiny Materials
    const suitMat = new THREE.MeshStandardMaterial({ color: 0x0033cc, metalness: 0.6, roughness: 0.2 }); // Classic Blue
    const bootMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, metalness: 0.5, roughness: 0.3 }); // Crimson Boots/Accents
    const skinMat = new THREE.MeshStandardMaterial({ color: 0xffcc99, roughness: 0.5 }); // Skin Tone
    const hairMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.8 }); // Black Hair
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xffbb00, metalness: 0.8, roughness: 0.1 }); // Gold Belt/Emblem

    // 4a. Athletic Torso/Chest
    const chestGeo = new THREE.CylinderGeometry(1.1, 0.7, 2.2, 32);
    const chest = new THREE.Mesh(chestGeo, suitMat);
    chest.rotation.x = Math.PI / 2; // Lie flat to orient forward
    chest.castShadow = true;
    hero.add(chest);

    // 4b. 3D Extruded S-Shield Emblem
    const shieldShape = new THREE.Shape();
    shieldShape.moveTo(0, 0.4);
    shieldShape.lineTo(0.35, 0.2);
    shieldShape.lineTo(0.25, -0.2);
    shieldShape.lineTo(0, -0.4);
    shieldShape.lineTo(-0.25, -0.2);
    shieldShape.lineTo(-0.35, 0.2);
    shieldShape.closePath();

    const extrudeSettings = { depth: 0.08, bevelEnabled: true, bevelSegments: 2, steps: 1, bevelSize: 0.02, bevelThickness: 0.02 };
    const shieldGeo = new THREE.ExtrudeGeometry(shieldShape, extrudeSettings);
    const emblem = new THREE.Mesh(shieldGeo, goldMat);
    emblem.position.set(0, 0.5, 1.05); // Placed on chest
    emblem.rotation.x = Math.PI / 2;
    hero.add(emblem);

    // 4c. Head & Styled Hair
    const headGeo = new THREE.SphereGeometry(0.5, 32, 32);
    const head = new THREE.Mesh(headGeo, skinMat);
    head.position.set(0, 0.4, 1.5);
    hero.add(head);

    const hairGeo = new THREE.SphereGeometry(0.52, 16, 16);
    const hair = new THREE.Mesh(hairGeo, hairMat);
    hair.position.set(0, 0.55, 1.45);
    hero.add(hair);

    // 4d. Outstretched Arms (Flying forward position)
    const armGeo = new THREE.CylinderGeometry(0.25, 0.18, 2.0, 16);
    const fistGeo = new THREE.SphereGeometry(0.18, 16, 16);

    // Left Arm
    const leftArmGroup = new THREE.Group();
    const leftArm = new THREE.Mesh(armGeo, suitMat);
    leftArm.position.y = 1.0;
    leftArmGroup.add(leftArm);
    const leftFist = new THREE.Mesh(fistGeo, skinMat);
    leftFist.position.y = 2.0;
    leftArmGroup.add(leftFist);

    leftArmGroup.position.set(-1.0, 0.4, 0.8);
    leftArmGroup.rotation.x = Math.PI / 2 + 0.1; // Outstretched forward
    leftArmGroup.rotation.z = -0.15;
    hero.add(leftArmGroup);

    // Right Arm
    const rightArmGroup = new THREE.Group();
    const rightArm = new THREE.Mesh(armGeo, suitMat);
    rightArm.position.y = 1.0;
    rightArmGroup.add(rightArm);
    const rightFist = new THREE.Mesh(fistGeo, skinMat);
    rightFist.position.y = 2.0;
    rightArmGroup.add(rightFist);

    rightArmGroup.position.set(1.0, 0.4, 0.8);
    rightArmGroup.rotation.x = Math.PI / 2 + 0.1; // Outstretched forward
    rightArmGroup.rotation.z = 0.15;
    hero.add(rightArmGroup);

    // 4e. Muscular Legs & Red Boots
    const legGeo = new THREE.CylinderGeometry(0.35, 0.25, 2.4, 16);
    const bootGeo = new THREE.CylinderGeometry(0.26, 0.20, 1.0, 16);

    // Left Leg
    const leftLegGroup = new THREE.Group();
    const leftLeg = new THREE.Mesh(legGeo, suitMat);
    leftLeg.position.y = -1.2;
    leftLegGroup.add(leftLeg);
    const leftBoot = new THREE.Mesh(bootGeo, bootMat);
    leftBoot.position.y = -2.0;
    leftLegGroup.add(leftBoot);

    leftLegGroup.position.set(-0.45, 0, -1.0);
    leftLegGroup.rotation.x = Math.PI / 2 - 0.05;
    hero.add(leftLegGroup);

    // Right Leg
    const rightLegGroup = new THREE.Group();
    const rightLeg = new THREE.Mesh(legGeo, suitMat);
    rightLeg.position.y = -1.2;
    rightLegGroup.add(rightLeg);
    const rightBoot = new THREE.Mesh(bootGeo, bootMat);
    rightBoot.position.y = -2.0;
    rightLegGroup.add(rightBoot);

    rightLegGroup.position.set(0.45, 0, -1.0);
    rightLegGroup.rotation.x = Math.PI / 2 - 0.05;
    hero.add(rightLegGroup);

    // 4f. DYNAMIC SEGMENTED CAPE (High-Polygon Cloth Grid)
    // A high-res plane that we will manually wave in the loop
    const capeWidthSegments = 20;
    const capeHeightSegments = 20;
    const capeGeo = new THREE.PlaneGeometry(2.0, 4.5, capeWidthSegments, capeHeightSegments);
    const capeMat = new THREE.MeshStandardMaterial({
      color: 0xcc0000,
      roughness: 0.6,
      metalness: 0.1,
      side: THREE.DoubleSide
    });
    const cape = new THREE.Mesh(capeGeo, capeMat);
    
    // Position cape on his shoulders pointing backward
    cape.position.set(0, 0.45, -1.1);
    cape.rotation.x = Math.PI / 2 - 0.1; // Lie flat behind him
    hero.add(cape);

    // --- 5. REAL-TIME RENDER & PHYSICS LOOP ---
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const delta = clock.getDelta();
      const time = clock.getElapsedTime();

      // --- CAPE WIND SIMULATION MATH ---
      const pos = capeGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i);
        const y = pos.getY(i); // Ranges from -2.25 to 2.25
        
        // Pin the cape at the shoulders (top), let it wave wildly at the bottom
        const factor = (2.25 - y) / 4.5; // 0 at shoulders, 1 at the tail

        // Complex wave interactions (sin and cos waves crashing together)
        const waveZ = Math.sin(y * 2.5 - time * 25) * 0.45 * factor;
        const waveX = Math.cos(y * 1.5 - time * 18) * 0.15 * factor;

        pos.setZ(i, waveZ - 0.15); // Wave depthwise
        pos.setX(i, x + waveX);     // Flutter sideways
      }
      pos.needsUpdate = true; // Tell WebGL to re-render the modified cape shape
      capeGeo.computeVertexNormals(); // Recompute light reflections across the ripples

      // --- ENVIRONMENT STREAMING SPEED MOVEMENT ---
      // Speed Dust particles
      const positionsAttr = speedDust.geometry.attributes.position;
      for (let i = 0; i < particleCount; i++) {
        let z = positionsAttr.getZ(i);
        z += speeds[i] * delta; // Move towards camera
        
        // Loop back to horizon once passed
        if (z > 10) {
          z = -100;
          positionsAttr.setX(i, (Math.random() - 0.5) * 35);
          positionsAttr.setY(i, (Math.random() - 0.5) * 20);
        }
        positionsAttr.setZ(i, z);
      }
      positionsAttr.needsUpdate = true;

      // Volumetric Clouds
      clouds.forEach(cloud => {
        cloud.position.z += 45 * delta; // Rush past the camera
        if (cloud.position.z > 15) {
          cloud.position.z = -150;
          cloud.position.x = (Math.random() - 0.5) * 45;
          cloud.position.y = (Math.random() - 0.5) * 25;
        }
      });

      // --- SUPERHERO IDLE FLYING SWAY ---
      hero.position.y = Math.sin(time * 3) * 0.15; // Hovering altitude drift
      hero.position.x = Math.cos(time * 1.2) * 0.1; // Swaying lateral wind resistance
      hero.rotation.z = Math.cos(time * 1.2) * 0.05; // Body roll

      // Subtle Camera Turbulence Shake (Simulating high-speed flight force)
      camera.position.x = 0 + Math.sin(time * 45) * 0.015;
      camera.position.y = 2 + Math.cos(time * 40) * 0.015;

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    // --- 6. WINDOW RESIZE SYSTEM ---
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
